<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0e1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Coleta Fadiga FAB · 1º/2º GT</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Exo+2:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ─── RESET & BASE ─── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:       #0a0e1a;
  --bg2:      #0f1528;
  --bg3:      #141c35;
  --green:    #00FF88;
  --green-dim:#00cc6a;
  --amber:    #FFB300;
  --amber-dim:#cc8f00;
  --blue:     #4FC3F7;
  --red:      #FF4444;
  --text:     #e0e8ff;
  --text-dim: #7a8ab0;
  --border:   rgba(0,255,136,0.25);
  --glow:     0 0 12px rgba(0,255,136,0.35);
  --glow-amber: 0 0 12px rgba(255,179,0,0.4);
  --font-title: 'Orbitron', monospace;
  --font-data:  'Share Tech Mono', monospace;
  --font-body:  'Exo 2', sans-serif;
}
html, body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  min-height: 100vh;
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background-image:
    radial-gradient(circle, rgba(0,255,136,0.06) 1px, transparent 1px);
  background-size: 28px 28px;
  pointer-events: none;
}
#app { position: relative; z-index: 1; min-height: 100vh; }

/* ─── ANIMATIONS ─── */
@keyframes fadeIn   { from { opacity:0 } to { opacity:1 } }
@keyframes slideUp  { from { opacity:0; transform:translateY(24px) } to { opacity:1; transform:translateY(0) } }
@keyframes pulse    { 0%,100% { opacity:1 } 50% { opacity:0.5 } }
@keyframes scanline { 0% { top:-4px } 100% { top:100% } }
@keyframes glow-pulse { 0%,100%{ box-shadow:var(--glow) } 50%{ box-shadow:0 0 24px rgba(0,255,136,0.6) } }

.fade-in  { animation: fadeIn  0.4s ease forwards; }
.slide-up { animation: slideUp 0.4s ease forwards; }

/* ─── LAYOUT CONTAINERS ─── */
.screen {
  max-width: 520px;
  margin: 0 auto;
  padding: 20px 16px 40px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
.card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  box-shadow: var(--glow);
  margin-bottom: 16px;
}
.card-amber {
  border-color: rgba(255,179,0,0.35);
  box-shadow: var(--glow-amber);
}

/* ─── HEADER ─── */
.app-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 16px 0 20px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 20px;
}
.app-header .logo {
  font-family: var(--font-title);
  font-size: 13px;
  color: var(--green);
  line-height: 1.3;
  flex: 1;
}
.app-header .pilot-id {
  font-family: var(--font-data);
  font-size: 12px;
  color: var(--amber);
  background: rgba(255,179,0,0.1);
  border: 1px solid rgba(255,179,0,0.3);
  padding: 4px 10px;
  border-radius: 4px;
}

/* ─── PROGRESS BAR ─── */
.progress-bar-wrap {
  margin-bottom: 20px;
}
.progress-label {
  display: flex;
  justify-content: space-between;
  font-family: var(--font-data);
  font-size: 11px;
  color: var(--text-dim);
  margin-bottom: 6px;
}
.progress-track {
  height: 4px;
  background: var(--bg3);
  border-radius: 2px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--green), var(--blue));
  border-radius: 2px;
  transition: width 0.4s ease;
  box-shadow: 0 0 8px rgba(0,255,136,0.6);
}

/* ─── SECTION TITLE ─── */
.section-title {
  font-family: var(--font-title);
  font-size: 14px;
  color: var(--green);
  letter-spacing: 1px;
  margin-bottom: 14px;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-title::before {
  content: '';
  display: inline-block;
  width: 3px;
  height: 16px;
  background: var(--green);
  border-radius: 2px;
  box-shadow: 0 0 8px var(--green);
}
.section-subtitle {
  font-family: var(--font-data);
  font-size: 11px;
  color: var(--blue);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 8px;
}

/* ─── FORM ELEMENTS ─── */
.field-group { margin-bottom: 18px; }
.field-label {
  display: block;
  font-size: 13px;
  color: var(--text-dim);
  margin-bottom: 6px;
  font-weight: 500;
  line-height: 1.4;
}
.field-label .required { color: var(--green); margin-left: 2px; }

input[type="number"], input[type="text"], input[type="time"], textarea, select {
  width: 100%;
  background: var(--bg3);
  border: 1px solid rgba(79,195,247,0.25);
  border-radius: 6px;
  color: var(--text);
  font-family: var(--font-data);
  font-size: 15px;
  padding: 10px 14px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  -webkit-appearance: none;
  appearance: none;
}
input[type="number"]:focus, input[type="text"]:focus,
input[type="time"]:focus, textarea:focus, select:focus {
  border-color: var(--green);
  box-shadow: 0 0 8px rgba(0,255,136,0.2);
}
input[type="number"]::placeholder, input[type="text"]::placeholder,
textarea::placeholder { color: var(--text-dim); opacity: 0.6; }
textarea { resize: vertical; min-height: 80px; line-height: 1.5; }
select option { background: var(--bg3); }

.input-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.input-row-3 {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
}

/* ─── RADIO / CHECKBOX OPTIONS ─── */
.options-list { display: flex; flex-direction: column; gap: 8px; }
.options-row  { display: flex; flex-wrap: wrap; gap: 8px; }

.opt-btn {
  display: block;
  width: 100%;
  background: var(--bg3);
  border: 1px solid rgba(79,195,247,0.2);
  border-radius: 8px;
  color: var(--text);
  font-family: var(--font-body);
  font-size: 13px;
  padding: 11px 14px;
  text-align: left;
  cursor: pointer;
  transition: all 0.15s;
  line-height: 1.4;
}
.opt-btn:hover  { border-color: var(--green); background: rgba(0,255,136,0.05); }
.opt-btn.active { border-color: var(--green); background: rgba(0,255,136,0.12); color: #fff; box-shadow: 0 0 8px rgba(0,255,136,0.25); }

.opt-btn-sm {
  flex: 0 0 auto;
  background: var(--bg3);
  border: 1px solid rgba(79,195,247,0.2);
  border-radius: 6px;
  color: var(--text);
  font-family: var(--font-data);
  font-size: 13px;
  padding: 9px 16px;
  cursor: pointer;
  transition: all 0.15s;
}
.opt-btn-sm:hover  { border-color: var(--green); background: rgba(0,255,136,0.05); }
.opt-btn-sm.active { border-color: var(--green); background: rgba(0,255,136,0.15); color: var(--green); }

/* ─── SCALE (KSS/SPS/NASA-TLX) ─── */
.scale-container { margin-top: 6px; }
.scale-item {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 10px 12px;
  border-radius: 8px;
  border: 1px solid transparent;
  cursor: pointer;
  transition: all 0.15s;
  margin-bottom: 6px;
}
.scale-item:hover  { background: rgba(0,255,136,0.05); border-color: rgba(0,255,136,0.2); }
.scale-item.active { background: rgba(0,255,136,0.12); border-color: var(--green); box-shadow: 0 0 8px rgba(0,255,136,0.2); }
.scale-num {
  font-family: var(--font-data);
  font-size: 18px;
  color: var(--green);
  min-width: 28px;
  text-align: right;
  flex-shrink: 0;
  font-weight: bold;
}
.scale-item.active .scale-num { color: var(--green); text-shadow: 0 0 8px var(--green); }
.scale-desc { font-size: 13px; color: var(--text-dim); line-height: 1.4; }
.scale-item.active .scale-desc { color: var(--text); }

/* ─── NASA-TLX SLIDER ─── */
.tlx-dimension { margin-bottom: 24px; }
.tlx-dim-name {
  font-family: var(--font-title);
  font-size: 12px;
  color: var(--amber);
  letter-spacing: 1px;
  margin-bottom: 4px;
}
.tlx-dim-question {
  font-size: 12px;
  color: var(--text-dim);
  margin-bottom: 10px;
  line-height: 1.4;
}
.tlx-scale-wrap { position: relative; }
.tlx-poles {
  display: flex;
  justify-content: space-between;
  font-family: var(--font-data);
  font-size: 10px;
  color: var(--text-dim);
  margin-bottom: 4px;
}
.tlx-slider {
  width: 100%;
  -webkit-appearance: none;
  appearance: none;
  height: 6px;
  background: var(--bg3);
  border-radius: 3px;
  outline: none;
  cursor: pointer;
  border: 1px solid rgba(255,179,0,0.2);
}
.tlx-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 22px; height: 22px;
  border-radius: 50%;
  background: var(--amber);
  box-shadow: 0 0 8px rgba(255,179,0,0.6);
  cursor: pointer;
  border: 2px solid var(--bg);
}
.tlx-slider::-moz-range-thumb {
  width: 22px; height: 22px;
  border-radius: 50%;
  background: var(--amber);
  box-shadow: 0 0 8px rgba(255,179,0,0.6);
  cursor: pointer;
  border: 2px solid var(--bg);
}
.tlx-value-display {
  text-align: center;
  font-family: var(--font-data);
  font-size: 22px;
  color: var(--amber);
  margin-top: 6px;
  font-weight: bold;
  text-shadow: 0 0 10px rgba(255,179,0,0.5);
}
.tlx-not-set { color: var(--text-dim); font-size: 14px; }

/* ─── BUTTONS ─── */
.btn-primary {
  display: block;
  width: 100%;
  background: linear-gradient(135deg, var(--green), var(--green-dim));
  color: #0a0e1a;
  font-family: var(--font-title);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 1px;
  padding: 15px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  text-transform: uppercase;
  box-shadow: 0 0 16px rgba(0,255,136,0.4);
  transition: all 0.2s;
  margin-top: 8px;
}
.btn-primary:hover   { box-shadow: 0 0 24px rgba(0,255,136,0.6); transform: translateY(-1px); }
.btn-primary:active  { transform: translateY(0); }
.btn-primary:disabled {
  background: var(--bg3);
  color: var(--text-dim);
  box-shadow: none;
  cursor: not-allowed;
  transform: none;
}
.btn-amber {
  display: block;
  width: 100%;
  background: linear-gradient(135deg, var(--amber), var(--amber-dim));
  color: #0a0e1a;
  font-family: var(--font-title);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 1px;
  padding: 16px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  text-transform: uppercase;
  box-shadow: var(--glow-amber);
  transition: all 0.2s;
  margin-top: 8px;
}
.btn-amber:hover { box-shadow: 0 0 24px rgba(255,179,0,0.6); transform: translateY(-1px); }
.btn-ghost {
  display: block;
  width: 100%;
  background: transparent;
  color: var(--text-dim);
  font-family: var(--font-body);
  font-size: 13px;
  padding: 12px;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px;
  cursor: pointer;
  margin-top: 8px;
  transition: all 0.2s;
}
.btn-ghost:hover { border-color: var(--text-dim); color: var(--text); }
.btn-secondary {
  display: block;
  width: 100%;
  background: transparent;
  color: var(--blue);
  font-family: var(--font-body);
  font-size: 12px;
  padding: 12px;
  border: 1px solid var(--blue);
  border-radius: 8px;
  cursor: pointer;
  margin-top: 8px;
  transition: all 0.2s;
}
.btn-secondary:hover { border-color: var(--green); color: var(--green); box-shadow: 0 0 16px rgba(79,195,247,0.3); }

/* ─── TOAST ─── */
#toast {
  position: fixed;
  top: 16px; left: 50%;
  transform: translateX(-50%) translateY(-80px);
  background: rgba(255,100,0,0.95);
  color: #fff;
  font-family: var(--font-body);
  font-size: 13px;
  padding: 12px 20px;
  border-radius: 8px;
  z-index: 9999;
  transition: transform 0.3s ease;
  max-width: calc(100vw - 32px);
  text-align: center;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}
#toast.show { transform: translateX(-50%) translateY(0); }

/* ─── MOMENT CARDS (HOME) ─── */
.moment-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 18px;
  margin-bottom: 14px;
  box-shadow: var(--glow);
  transition: all 0.2s;
}
.moment-card.locked {
  border-color: rgba(255,255,255,0.08);
  box-shadow: none;
  opacity: 0.6;
}
.moment-card.done {
  border-color: rgba(0,255,136,0.4);
  background: rgba(0,255,136,0.04);
}
.moment-card-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 10px;
}
.moment-number {
  font-family: var(--font-data);
  font-size: 28px;
  color: var(--green);
  font-weight: bold;
  min-width: 32px;
}
.moment-card.locked .moment-number { color: var(--text-dim); }
.moment-card.done .moment-number { color: var(--green); }
.moment-title {
  font-family: var(--font-title);
  font-size: 11px;
  color: var(--text);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  line-height: 1.4;
}
.moment-status {
  margin-left: auto;
  font-size: 18px;
}
.moment-desc {
  font-size: 12px;
  color: var(--text-dim);
  margin-bottom: 12px;
  line-height: 1.5;
}
.moment-done-info {
  font-family: var(--font-data);
  font-size: 11px;
  color: var(--green);
  background: rgba(0,255,136,0.08);
  padding: 6px 10px;
  border-radius: 4px;
}
.locked-info {
  font-family: var(--font-data);
  font-size: 11px;
  color: var(--text-dim);
  display: flex;
  align-items: center;
  gap: 6px;
}

/* ─── PAUSE SCREEN ─── */
.pause-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  padding: 30px 16px;
}
.pause-icon {
  font-size: 64px;
  margin-bottom: 16px;
  animation: pulse 2s ease-in-out infinite;
}
.pause-title {
  font-family: var(--font-title);
  font-size: 18px;
  color: var(--amber);
  margin-bottom: 8px;
  text-shadow: 0 0 12px rgba(255,179,0,0.5);
}
.pause-subtitle {
  font-size: 13px;
  color: var(--text-dim);
  margin-bottom: 24px;
  line-height: 1.5;
}
.procedure-list {
  background: var(--bg3);
  border: 1px solid rgba(255,179,0,0.2);
  border-radius: 10px;
  padding: 16px;
  width: 100%;
  text-align: left;
  margin-bottom: 24px;
}
.procedure-item {
  display: flex;
  gap: 12px;
  align-items: flex-start;
  padding: 10px 0;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  font-size: 13px;
  color: var(--text);
  line-height: 1.5;
}
.procedure-item:last-child { border-bottom: none; }
.procedure-num {
  font-family: var(--font-data);
  font-size: 16px;
  color: var(--amber);
  min-width: 24px;
  font-weight: bold;
}

/* ─── TIMER ─── */
.timer-display {
  font-family: var(--font-data);
  font-size: 48px;
  color: var(--green);
  text-shadow: 0 0 20px rgba(0,255,136,0.6);
  margin: 12px 0;
  letter-spacing: 4px;
}
.timer-label {
  font-size: 11px;
  color: var(--text-dim);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.timer-bar-wrap {
  width: 100%;
  height: 6px;
  background: var(--bg3);
  border-radius: 3px;
  overflow: hidden;
  margin-bottom: 20px;
}
.timer-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--green), var(--blue));
  border-radius: 3px;
  transition: width 1s linear;
  box-shadow: 0 0 8px rgba(0,255,136,0.6);
}

/* ─── SUCCESS / DONE ─── */
.success-icon {
  font-size: 72px;
  text-align: center;
  margin: 20px 0 16px;
  animation: glow-pulse 2s ease-in-out infinite;
}
.success-title {
  font-family: var(--font-title);
  font-size: 20px;
  color: var(--green);
  text-align: center;
  margin-bottom: 8px;
  text-shadow: 0 0 16px rgba(0,255,136,0.5);
}
.success-msg {
  text-align: center;
  font-size: 14px;
  color: var(--text-dim);
  line-height: 1.6;
  margin-bottom: 24px;
}

/* ─── ERROR SCREEN ─── */
.error-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  text-align: center;
  padding: 24px;
}
.error-icon { font-size: 64px; margin-bottom: 16px; }
.error-title {
  font-family: var(--font-title);
  font-size: 18px;
  color: var(--red);
  margin-bottom: 12px;
  text-shadow: 0 0 12px rgba(255,68,68,0.4);
}
.error-msg { font-size: 14px; color: var(--text-dim); line-height: 1.6; }

/* ─── TCLE ─── */
.tcle-body {
  font-size: 13px;
  color: var(--text-dim);
  line-height: 1.7;
  max-height: 55vh;
  overflow-y: auto;
  padding-right: 6px;
  margin-bottom: 20px;
}
.tcle-body::-webkit-scrollbar { width: 4px; }
.tcle-body::-webkit-scrollbar-track { background: var(--bg3); }
.tcle-body::-webkit-scrollbar-thumb { background: var(--green-dim); border-radius: 2px; }
.tcle-section {
  margin-bottom: 16px;
  padding-bottom: 16px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.tcle-section:last-child { border-bottom: none; }
.tcle-section-title {
  font-family: var(--font-title);
  font-size: 10px;
  color: var(--blue);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.tcle-section p { margin-bottom: 8px; }
.tcle-section ul { padding-left: 16px; }
.tcle-section li { margin-bottom: 4px; }
.tcle-scroll-hint {
  text-align: center;
  font-family: var(--font-data);
  font-size: 11px;
  color: var(--amber);
  margin-bottom: 8px;
  animation: pulse 2s infinite;
}

/* ─── FOOTER ─── */
.app-footer {
  text-align: center;
  font-family: var(--font-data);
  font-size: 10px;
  color: var(--text-dim);
  margin-top: auto;
  padding-top: 24px;
  opacity: 0.5;
}

/* ─── DIVIDER ─── */
.divider {
  border: none;
  border-top: 1px solid rgba(255,255,255,0.07);
  margin: 16px 0;
}

/* ─── INLINE INFO BOX ─── */
.info-box {
  background: rgba(79,195,247,0.07);
  border: 1px solid rgba(79,195,247,0.2);
  border-radius: 8px;
  padding: 12px 14px;
  font-size: 12px;
  color: var(--blue);
  line-height: 1.6;
  margin-bottom: 16px;
}
.info-box-amber {
  background: rgba(255,179,0,0.07);
  border-color: rgba(255,179,0,0.2);
  color: var(--amber);
}

/* ─── OFFLINE BANNER ─── */
#offline-banner {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: rgba(255,100,0,0.92);
  color: #fff;
  font-family: var(--font-data);
  font-size: 12px;
  text-align: center;
  padding: 10px;
  z-index: 9998;
  display: none;
}

/* ─── RESPONSIVE ─── */
@media (max-width: 360px) {
  .input-row { grid-template-columns: 1fr; }
  .input-row-3 { grid-template-columns: 1fr 1fr; }
}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast"></div>
<div id="offline-banner">⚡ Sem conexão — dados serão enviados ao reconectar</div>

<script>
'use strict';

/* ═══════════════════════════════════════════════════════
   CONFIGURAÇÃO — editar conforme necessário

/* ═══════════════════════════════════════════════════════
   ESTADO GLOBAL
   ═══════════════════════════════════════════════════════ */
let TOKEN = null;
let PARTICIPANT = null;
let STATE = null;

function stateKey() { return `fadiga_${TOKEN}_state`; }

function loadState() {
  try {
    const raw = localStorage.getItem(stateKey());
    if (raw) return JSON.parse(raw);
  } catch(_) {}
  return {
    m1: { status:'pending', step:0, data:{}, startTs:null },
    m2: { status:'pending', step:0, data:{}, startTs:null },
    m3: { status:'pending', step:0, data:{}, startTs:null }
  };
}

function saveState() {
  try { localStorage.setItem(stateKey(), JSON.stringify(STATE)); } catch(_) {}
}

/* ═══════════════════════════════════════════════════════
   ROUTER / BOOT
   ═══════════════════════════════════════════════════════ */
function boot() {
  const params = new URLSearchParams(window.location.search);
  TOKEN = params.get('t') || null;

  if (!TOKEN || !TOKENS[TOKEN]) {
    renderError(); return;
  }
  PARTICIPANT = TOKENS[TOKEN];
  STATE = loadState();
  renderHome();
}

/* ═══════════════════════════════════════════════════════
   TOAST
   ═══════════════════════════════════════════════════════ */
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3200);
}

function header() {

function progressBar(step, total, label) {
  const pct = Math.round((step / total) * 100);
  return `<div class="progress-bar-wrap">
    <div class="progress-label">
      <span>${label || ''}</span>
      <span>ETAPA ${step}/${total}</span>
    </div>
    <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
  </div>`;
}

function footer() {
  return `<div class="app-footer">Raphael Filgueiras · UNIFA · v1.0</div>`;
}

function backButton(mId) {
  if (STATE[mId].step > 0) {
    return `<button class="btn-secondary" onclick="backStep('${mId}')">← VOLTAR</button>`;
  }
  return '';
}

/* ═══════════════════════════════════════════════════════
   TELA: HOME
   ═══════════════════════════════════════════════════════ */
function renderHome() {
  const m = STATE;
  const cards = [
    { id:'m1', n:'01', title:'DIA SEM VOO', sub:'Baseline — Caracterização + IPAQ + VFC/PVT + Escalas',
      desc:'Questionários de caracterização e atividade física, coleta fisiológica e escalas de fadiga/sonolência. ~20 min.' },
    { id:'m2', n:'02', title:'ANTES DO PRÉ-VOO', sub:'Dia do voo — Pré-Missão + VFC/PVT + Escalas',
      desc:'Questionário pré-missão, coleta fisiológica e escalas. ~15 min.' },
    { id:'m3', n:'03', title:'APÓS O PRÉ-VOO', sub:'Antes de acionar motores — VFC/PVT + NASA-TLX + Escalas',
      desc:'Coleta fisiológica, NASA-TLX e escalas de fadiga/sonolência. ~15 min.' }
  ];

  let html = `<div class="screen fade-in">${header()}
    <div class="section-title">MISSÃO DE COLETA</div>`;

  cards.forEach((c, i) => {
    const st = m[c.id];
    const prev = i === 0 ? null : m[cards[i-1].id];
    const locked = i > 0 && prev.status !== 'done';
    const done   = st.status === 'done';

    let statusIcon = locked ? '🔒' : done ? '✅' : '▶️';
    let cardClass  = locked ? 'locked' : done ? 'done' : '';
    let bottom = '';

    if (done) {
      const ts = st.endTs ? new Date(st.endTs).toLocaleString('pt-BR') : '';
      bottom = `<div class="moment-done-info">✔ Concluído em ${ts}</div>`;
    } else if (locked) {
      bottom = `<div class="locked-info">🔒 Disponível após concluir Momento ${i}</div>`;
    } else {
      bottom = `<button class="btn-primary" onclick="startMoment('${c.id}')">▶ INICIAR MOMENTO ${c.n}</button>`;
    }

    html += `<div class="moment-card ${cardClass}">
      <div class="moment-card-header">
        <div class="moment-number">${c.n}</div>
        <div>
          <div class="moment-title">${c.title}</div>
          <div style="font-family:var(--font-data);font-size:10px;color:var(--text-dim);margin-top:2px">${c.sub}</div>
        </div>
        <div class="moment-status">${statusIcon}</div>
      </div>
      <div class="moment-desc">${c.desc}</div>
      ${bottom}
    </div>`;
  });

  html += `${footer()}</div>`;
  setApp(html);
}

function startMoment(mId) {
  const s = STATE[mId];
  if (!s.startTs) { s.startTs = new Date().toISOString(); saveState(); }
  renderStep(mId);
}

/* ═══════════════════════════════════════════════════════
   DEFINIÇÃO DOS PASSOS POR MOMENTO
   ═══════════════════════════════════════════════════════ */
const STEPS = {
  m1: ['tcle','caract','ipaq','pausa','kss','sps','obs'],
  m2: ['premissao_a','premissao_b','pausa','kss','sps','obs'],
  m3: ['pausa','nasatlx','kss','sps','obs']
};

const STEP_LABELS = {
  tcle:'TCLE', caract:'CARACTERIZAÇÃO', ipaq:'IPAQ',
  pausa:'PAUSA VFC+PVT', kss:'KSS', sps:'SPS', obs:'OBSERVAÇÕES',
  premissao_a:'PRÉ-MISSÃO A', premissao_b:'PRÉ-MISSÃO B', nasatlx:'NASA-TLX'
};

function renderStep(mId) {
  const steps = STEPS[mId];
  const stepIdx = STATE[mId].step;
  const stepId  = steps[stepIdx];
  const total   = steps.length;

  const renderers = {
    tcle: () => renderTCLE(mId),
    caract: () => renderCaract(mId),
    ipaq: () => renderIPAQ(mId),
    pausa: () => renderPausa(mId, stepIdx, total),
    kss: () => renderKSS(mId, stepIdx, total),
    sps: () => renderSPS(mId, stepIdx, total),
    obs: () => renderObs(mId, stepIdx, total),
    premissao_a: () => renderPremissaoA(mId),
    premissao_b: () => renderPremissaoB(mId),
    nasatlx: () => renderNASATLX(mId)
  };

  if (renderers[stepId]) renderers[stepId]();
  else advanceStep(mId);
}

function advanceStep(mId) {
  const steps = STEPS[mId];
  STATE[mId].step++;
  saveState();
  if (STATE[mId].step >= steps.length) {
    completeMoment(mId);
  } else {
    renderStep(mId);
  }
}

function backStep(mId) {
  if (STATE[mId].step > 0) {
    STATE[mId].step--;
    saveState();
    renderStep(mId);
  }
}

function collectFormData(mId, fields) {
  const data = STATE[mId].data;
  fields.forEach(f => {
    const el = document.getElementById(f);
    if (el) data[f] = el.value;
  });
  saveState();
}

function selectOpt(groupId, fieldId, val, btn) {
  document.querySelectorAll(`#${groupId} .opt-btn, #${groupId} .opt-btn-sm`).forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(fieldId).value = val;
}

function submitCaract(mId) {
  const fields = ['m1_idade','m1_genero','m1_peso','m1_altura','m1_posto','m1_qualificacao','m1_horas_total','m1_horas_c99'];
  const labels = { m1_idade:'Idade', m1_genero:'Gênero', m1_peso:'Peso', m1_altura:'Altura',
    m1_posto:'Posto/Graduação', m1_qualificacao:'Qualificação Operacional',
    m1_horas_total:'Horas totais de voo', m1_horas_c99:'Horas na C-99' };

  for (const f of fields) {
    const v = document.getElementById(f)?.value;
    if (!v || v.trim() === '') { showToast(`Campo obrigatório: ${labels[f]}`); return; }
    if (f === 'm1_idade' && (parseInt(v) < 18 || parseInt(v) > 70)) {
      showToast('Idade deve ser entre 18 e 70 anos.'); return;
    }
  }
  collectFormData(mId, fields);
  advanceStep(mId);
}

function ipaqToggle(blockId, val) {
  const block = document.getElementById(blockId);
  if (!block) return;
  block.style.display = (val && val !== 'Nenhum' && val !== '0') ? 'block' : 'none';
}

function submitIPAQ(mId) {
  const d = STATE[mId].data;
  const fields = ['m1_ipaq_1a','m1_ipaq_2a','m1_ipaq_3a','m1_ipaq_4a_h','m1_ipaq_4a_m','m1_ipaq_4b_h','m1_ipaq_4b_m'];
  const labels = {m1_ipaq_1a:'Seção 1 — dias caminhando',m1_ipaq_2a:'Seção 2 — dias moderado',m1_ipaq_3a:'Seção 3 — dias vigoroso',
    m1_ipaq_4a_h:'Seção 4a — horas sentado (semana)',m1_ipaq_4a_m:'Seção 4a — minutos sentado (semana)',
    m1_ipaq_4b_h:'Seção 4b — horas sentado (fim de semana)',m1_ipaq_4b_m:'Seção 4b — minutos sentado (fim de semana)'};

  for (const f of ['m1_ipaq_1a','m1_ipaq_2a','m1_ipaq_3a']) {
    const v = document.getElementById(f)?.value;
    if (!v) { showToast(`Obrigatório: ${labels[f]}`); return; }
  }

  // Validar sub-campos quando dias > 0
  const checkSub = (daysKey, hKey, mKey) => {
    const days = document.getElementById(daysKey)?.value;
    if (days && days !== 'Nenhum') {
      const h = document.getElementById(hKey)?.value;
      const m = document.getElementById(mKey)?.value;
      if (!h && !m) { showToast(`Informe o tempo diário para ${labels[daysKey]}.`); return false; }
    }
    return true;
  };
  if (!checkSub('m1_ipaq_1a','m1_ipaq_1b_h','m1_ipaq_1b_m')) return;
  if (!checkSub('m1_ipaq_2a','m1_ipaq_2b_h','m1_ipaq_2b_m')) return;
  if (!checkSub('m1_ipaq_3a','m1_ipaq_3b_h','m1_ipaq_3b_m')) return;

  const h4a = document.getElementById('m1_ipaq_4a_h')?.value;
  const m4a = document.getElementById('m1_ipaq_4a_m')?.value;
  if (!h4a && !m4a) { showToast('Obrigatório: Seção 4a — informe horas ou minutos sentado (semana)'); return; }

  const h4b = document.getElementById('m1_ipaq_4b_h')?.value;
  const m4b = document.getElementById('m1_ipaq_4b_m')?.value;
  if (!h4b && !m4b) { showToast('Obrigatório: Seção 4b — informe horas ou minutos sentado (fim de semana)'); return; }

  const allFields = ['m1_ipaq_1a','m1_ipaq_1b_h','m1_ipaq_1b_m',
    'm1_ipaq_2a','m1_ipaq_2b_h','m1_ipaq_2b_m',
    'm1_ipaq_3a','m1_ipaq_3b_h','m1_ipaq_3b_m',
    'm1_ipaq_4a_h','m1_ipaq_4a_m','m1_ipaq_4b_h','m1_ipaq_4b_m'];
  collectFormData(mId, allFields);
  advanceStep(mId);
}

function submitPremissaoA(mId) {
  const req = ['m2_funcao_bordo','m2_funcao_operacional','m2_horario_decolagem','m2_autoridades','m2_comitiva'];
  const labels = {m2_funcao_bordo:'Função a Bordo',m2_funcao_operacional:'Função Operacional',
    m2_horario_decolagem:'Horário de decolagem',m2_autoridades:'Autoridades a bordo',m2_comitiva:'Comitiva a bordo'};
  for (const f of req) {
    const v = document.getElementById(f)?.value;
    if (!v || v.trim()==='') { showToast(`Obrigatório: ${labels[f]}`); return; }
  }
  if (document.getElementById('m2_autoridades')?.value === 'Sim') {
    const tipoAutor = document.getElementById('m2_tipo_autoridade')?.value;
    if (!tipoAutor || tipoAutor.trim()==='') { showToast('Obrigatório: Qual tipo de autoridade?'); return; }
  }
  if (document.getElementById('m2_comitiva')?.value === 'Sim') {
    const tipoComit = document.getElementById('m2_tipo_comitiva')?.value;
    if (!tipoComit || tipoComit.trim()==='') { showToast('Obrigatório: Qual tipo de comitiva?'); return; }
  }
  const h1 = document.getElementById('m2_tempo_voo_previsto_h')?.value;
  const m1 = document.getElementById('m2_tempo_voo_previsto_m')?.value;
  if ((!h1 || h1.trim()==='') && (!m1 || m1.trim()==='')) {
    showToast('Obrigatório: Tempo de voo previsto para o primeiro trecho'); return;
  }
  const h2 = document.getElementById('m2_tempo_voo_total_missao_h')?.value;
  const m2 = document.getElementById('m2_tempo_voo_total_missao_m')?.value;
  if ((!h2 || h2.trim()==='') && (!m2 || m2.trim()==='')) {
    showToast('Obrigatório: Tempo total de voo previsto na missão'); return;
  }
  let allFields = [...req, 'm2_tempo_voo_previsto_h', 'm2_tempo_voo_previsto_m', 'm2_tempo_voo_total_missao_h', 'm2_tempo_voo_total_missao_m'];
  if (document.getElementById('m2_autoridades')?.value === 'Sim') {
    allFields.push('m2_tipo_autoridade');
  }
  if (document.getElementById('m2_comitiva')?.value === 'Sim') {
    allFields.push('m2_tipo_comitiva');
  }
  collectFormData(mId, allFields);
  advanceStep(mId);
}

function submitPremissaoB(mId) {
  const d = STATE[mId].data;
  const req = ['m2_sono_horas','m2_sono_qualidade','m2_estresse','m2_cafeina','m2_deslocamento'];
  const labels = {m2_sono_horas:'Horas de sono',m2_sono_qualidade:'Qualidade do sono',m2_estresse:'Nível de estresse',
    m2_cafeina:'Consumo de cafeína',m2_deslocamento:'Tempo de deslocamento'};
  for (const f of req) {
    const v = document.getElementById(f)?.value;
    if (!v || v.trim()==='') { showToast(`Obrigatório: ${labels[f]}`); return; }

let _timerInterval = null;
function startTimer(seconds) {
  if (_timerInterval) clearInterval(_timerInterval);
  let remaining = seconds;
  const total = seconds;
  _timerInterval = setInterval(() => {
    remaining--;
    const disp = document.getElementById('timer-display');
    const bar  = document.getElementById('timer-bar');
    if (!disp) { clearInterval(_timerInterval); return; }
    const m = Math.floor(remaining / 60);
    const s = remaining % 60;
    disp.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    if (bar) bar.style.width = `${(remaining / total) * 100}%`;
    if (remaining <= 0) {
      clearInterval(_timerInterval);
      if (disp) disp.textContent = '00:00';
      if (bar) bar.style.width = '0%';
      showToast('✔ 4 minutos concluídos! Agora realize o PVT.');
    }
  }, 1000);
}
function resetTimer() { startTimer(240); }

/* ═══════════════════════════════════════════════════════
   ENVIO AO GOOGLE SHEETS
   ═══════════════════════════════════════════════════════ */
function buildPayload(mId) {
  const d = STATE[mId].data;
  const base = {
    token: TOKEN,
    codigo_participante: PARTICIPANT,
    momento: mId.toUpperCase(),
    timestamp_inicio: STATE[mId].startTs,
    timestamp_fim:    STATE[mId].endTs
  };
  return Object.assign(base, d);
}

async function sendToSheets(mId) {
  if (!SHEETS_URL || SHEETS_URL === 'COLE_AQUI_A_URL_DO_APPS_SCRIPT') return;

  const payload = buildPayload(mId);
  const pendingKey = `fadiga_${TOKEN}_pending_${mId}`;

  try {
    const resp = await fetch(SHEETS_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    localStorage.removeItem(pendingKey);
  } catch(err) {
    localStorage.setItem(pendingKey, JSON.stringify(payload));
    showToast('📡 Sem conexão — dados salvos localmente. Serão enviados ao reconectar.');
  }
}

async function retryPending() {
  if (!SHEETS_URL || SHEETS_URL === 'COLE_AQUI_A_URL_DO_APPS_SCRIPT') return;
  for (const mId of ['m1','m2','m3']) {
    const pendingKey = `fadiga_${TOKEN}_pending_${mId}`;
    const raw = localStorage.getItem(pendingKey);
    if (!raw) continue;
    try {
      await fetch(SHEETS_URL, {
        method: 'POST', mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: raw
      });
      localStorage.removeItem(pendingKey);
      showToast('✔ Dados enviados com sucesso!');
    } catch(_) {}
  }
}

/* ═══════════════════════════════════════════════════════

function updateOfflineBanner() {
  document.getElementById('offline-banner').style.display = navigator.onLine ? 'none' : 'block';
